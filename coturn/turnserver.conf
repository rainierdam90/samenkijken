# ============================================================================
# coturn — your own TURN/STUN server for WatchMovieTogether
#
# TURN relays the (still end-to-end encrypted) media when a direct peer-to-peer
# connection fails on strict networks. coturn cannot decrypt the media.
#
# Run this on a VPS with a PUBLIC, ideally STATIC, IP (Hetzner / DigitalOcean /
# Vultr / AWS Lightsail). TURN needs open ports and a stable IP, so it cannot
# live on Vercel/Render. If you'd rather not run a VPS, use a managed TURN
# provider (Cloudflare Realtime, Metered, Twilio) — see README.
#
# Install (Ubuntu):   sudo apt-get install coturn
# Enable:             set TURNSERVER_ENABLED=1 in /etc/default/coturn
# Config:             put this file at /etc/turnserver.conf  (edit the marked lines)
# Start:              sudo systemctl enable --now coturn
# ============================================================================

# Listening ports
listening-port=3478
tls-listening-port=5349

# >>> EDIT: your server's public IP <<<
# external-ip=203.0.113.10
# If behind NAT with a different internal IP:
# external-ip=203.0.113.10/10.0.0.5

# >>> EDIT: your domain (must match the TLS certificate below) <<<
realm=turn.watchmovietogether.com
server-name=turn.watchmovietogether.com

# ---- Time-limited credentials (REST API) ----
# This MUST equal the TURN_SECRET environment variable on your Node server.
# The Node server hands out short-lived username/credential pairs signed with it.
use-auth-secret
static-auth-secret=PUT-THE-SAME-VALUE-AS-TURN_SECRET-HERE

# ---- TLS (turns:) — strongly recommended ----
# Get a free cert with certbot for turn.watchmovietogether.com, then point here:
# cert=/etc/letsencrypt/live/turn.watchmovietogether.com/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.watchmovietogether.com/privkey.pem

# ---- Hardening ----
fingerprint
no-multicast-peers
no-tlsv1
no-tlsv1_1
# Don't let the relay be abused to reach private networks:
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
# Relay port range (open these in your firewall, UDP):
min-port=49152
max-port=65535

# Logging
log-file=/var/log/turnserver.log
simple-log

# Optional quota guards
# user-quota=12
# total-quota=1200
